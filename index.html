<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кабинет Родителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 👑 КРАСИВЫЙ ТЕМНЫЙ АДАПТИВНЫЙ ИНТЕРФЕЙС КАК НА СКРИНШОТАХ */
        body { font-family: -apple-system, sans-serif; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); margin: 0; padding: 16px; }
        .card { background: var(--tg-theme-bg-color, #2c2d30); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; color: var(--tg-theme-hint-color, #8e8e93); }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; font-size: 15px; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); outline: none; }
        .btn-submit { width: 100%; padding: 14px; background: var(--tg-theme-button-color, #4388cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .segment-control { display: flex; background: var(--tg-theme-secondary-bg-color, #1c1c1d); padding: 2px; border-radius: 8px; margin-bottom: 10px; }
        .segment-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; background: transparent; color: var(--tg-theme-text-color, #ffffff); cursor: pointer; font-size: 13px; font-weight: 500; }
        .segment-btn.active { background: var(--tg-theme-bg-color, #2c2d30); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .hidden { display: none; }
        label { font-size: 13px; margin-bottom: 6px; display: block; color: var(--tg-theme-hint-color, #8e8e93); }
        .char-counter { font-size: 11px; text-align: right; color: var(--tg-theme-hint-color, #8e8e93); margin-top: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-title">👶 Выбор ученика</div>
        <select id="childSelect"></select>
    </div>

    <div class="card">
        <div class="card-title">📖 Режим добавления книги</div>
        <div class="segment-control">
            <button class="segment-btn active" id="btnLib" onclick="setSource('library')">Из папки Library</button>
            <button class="segment-btn" id="btnManual" onclick="setSource('manual')">Свой текст</button>
        </div>
        
        <div id="srcLibraryBlock">
            <div class="card-title" style="margin-top: 15px;">📕 Выбор книги</div>
            <select id="bookSelect"></select>
        </div>
        
        <div id="srcManualBlock" class="hidden">
            <div class="card-title" style="margin-top: 15px;">📝 Новый рассказ</div>
            <input type="text" id="manualTitle" placeholder="Название задания" style="margin-bottom:8px;" maxlength="50">
            <textarea id="manualText" rows="6" placeholder="Вставьте свой текст (рекомендуется до 2000 символов)..." oninput="countChars()"></textarea>
            <div class="char-counter" id="charCount">Использовано: 0 / 2500 символов</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">⚙️ Настройки плана</div>
        <div style="margin-bottom:12px;">
            <label>Дневная норма страниц:</label>
            <select id="normPages">
                <option value="1">1 страница</option>
                <option value="2">2 страницы</option>
                <option value="3" selected>3 страницы</option>
                <option value="4">4 страницы</option>
                <option value="5">5 страниц</option>
                <option value="10">10 страниц</option>
            </select>
        </div>
        <div>
            <label>Награда (Бук-коины / грн):</label>
            <input type="number" id="rewardAmount" value="20">
        </div>
    </div>

    <button class="btn-submit" onclick="submitPlan()">Утвердить и отправить план</button>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        let currentSource = 'library';
        
        const urlParams = new URLSearchParams(window.location.search);
        const childrenParam = urlParams.get('children');
        const libraryParam = urlParams.get('library');
        
        // Надежный парсинг детей
        const childSelect = document.getElementById('childSelect');
        if (childrenParam && childrenParam !== 'none') {
            childSelect.innerHTML = '';
            childrenParam.split(',').forEach(item => {
                const parts = item.split(':');
                if (parts.length >= 2) {
                    const subParts = parts[1].split('^');
                    childSelect.innerHTML += `<option value="${parts[0]}">${subParts[0]}</option>`;
                }
            });
        } else {
            childSelect.innerHTML = '<option value="">Сначала добавьте ребенка</option>';
        }

        // Надежный парсинг библиотеки
        const bookSelect = document.getElementById('bookSelect');
        if (libraryParam && libraryParam !== 'none') {
            bookSelect.innerHTML = '';
            libraryParam.split(',').forEach(item => {
                const parts = item.split(':');
                if (parts.length >= 2) {
                    bookSelect.innerHTML += `<option value="${parts[0]}">${parts[1]}</option>`;
                }
            });
        } else {
            bookSelect.innerHTML = '<option value="">Библиотека пуста</option>';
        }

        function setSource(src) {
            currentSource = src;
            document.getElementById('btnLib').classList.toggle('active', src === 'library');
            document.getElementById('btnManual').classList.toggle('active', src === 'manual');
            document.getElementById('srcLibraryBlock').classList.toggle('hidden', src !== 'library');
            document.getElementById('srcManualBlock').classList.toggle('hidden', src !== 'manual');
        }

        function countChars() {
            const text = document.getElementById('manualText').value;
            const counter = document.getElementById('charCount');
            counter.innerText = `Использовано: ${text.length} / 2500 символов`;
            if (text.length > 2500) {
                counter.style.color = '#ff3b30'; // Красный цвет при превышении лимита
            } else {
                counter.style.color = '';
            }
        }

        function utf8_to_b64(str) { 
            return window.btoa(unescape(encodeURIComponent(str))); 
        }

        function submitPlan() {
            const childId = childSelect.value;
            if (!childId) return alert("Выберите ученика!");
            const norm = document.getElementById('normPages').value;
            const reward = document.getElementById('rewardAmount').value;

            if (currentSource === 'library') {
                const b = document.getElementById('bookSelect');
                if (!b.value) return alert("Выберите книгу!");
                tg.sendData(`library_meta|${norm}|${reward}|${b.value}|${b.options[b.selectedIndex].text}|${childId}`);
            } else {
                const t = document.getElementById('manualTitle').value.trim() || "Ручной текст";
                const textContent = document.getElementById('manualText').value.trim();
                
                if(!textContent) return alert("Введите текст задания!");
                
                if(textContent.length > 2500) {
                    return alert("Текст слишком длинный! Telegram не сможет его отправить. Пожалуйста, сократите его до 2500 символов.");
                }
                
                // Убираем множественные пустые строки, чтобы сэкономить лимит Telegram
                const optimizedText = textContent.replace(/\n{3,}/g, '\n\n');
                const secureText = utf8_to_b64(optimizedText);
                
                tg.sendData(`manual_init|${norm}|${reward}|${t}|${childId}|${secureText}`);
            }
            tg.close();
        }
    </script>
</body>
</html>
