<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет Родителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f7; margin: 0; padding: 16px; }
        .card { background: #ffffff; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; color: #8e8e93; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: #2481cc; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .segment-control { display: flex; background: #efeff4; padding: 2px; border-radius: 8px; margin-bottom: 10px; }
        .segment-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; background: none; cursor: pointer; }
        .segment-btn.active { background: #ffffff; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">👶 Ученик</div>
        <select id="childSelect"></select>
    </div>
    <div class="card">
        <div class="segment-control">
            <button class="segment-btn active" id="btnLib" onclick="setSource('library')">Библиотека</button>
            <button class="segment-btn" id="btnManual" onclick="setSource('manual')">Свой текст</button>
        </div>
        <div id="srcLibraryBlock"><select id="bookSelect"></select></div>
        <div id="srcManualBlock" class="hidden">
            <input type="text" id="manualTitle" placeholder="Название" style="margin-bottom:8px;">
            <textarea id="manualText" rows="5" placeholder="Текст задания..."></textarea>
        </div>
    </div>
    <button class="btn-submit" onclick="submitPlan()">Утвердить план</button>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let currentSource = 'library';
        const urlParams = new URLSearchParams(window.location.search);
        
        // Заполнение данных
        const children = JSON.parse(decodeURIComponent(urlParams.get('children') || '[]'));
        const childSelect = document.getElementById('childSelect');
        children.forEach(c => childSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);

        function setSource(src) {
            currentSource = src;
            document.getElementById('btnLib').classList.toggle('active', src === 'library');
            document.getElementById('btnManual').classList.toggle('active', src === 'manual');
            document.getElementById('srcLibraryBlock').classList.toggle('hidden', src !== 'library');
            document.getElementById('srcManualBlock').classList.toggle('hidden', src !== 'manual');
        }

        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }

        function submitPlan() {
            const childId = childSelect.value;
            if (currentSource === 'library') {
                const b = document.getElementById('bookSelect');
                tg.sendData(`library_meta|3|20|${b.value}|${b.options[b.selectedIndex].text}|${childId}`);
            } else {
                const t = document.getElementById('manualTitle').value;
                const txt = utf8_to_b64(document.getElementById('manualText').value);
                tg.sendData(`manual_init|3|20|${t}|${childId}|${txt}`);
            }
            tg.close();
        }
    </script>
</body>
</html>
