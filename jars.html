<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройки Банок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 16px; background: #f4f4f7; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; color: #8e8e93; }
        input, select { width: 100%; padding: 10px 12px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fff;}
        button { width: 100%; padding: 14px; background: #2481cc; color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }
        label { font-size: 13px; margin-bottom: 6px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">👶 Ученик</div>
        <select id="childSelect" onchange="onChildChange()"></select>
        
        <div class="card-title">💳 Банка или номер карты</div>
        <input type="text" id="jarInput" placeholder="Ссылка на Моно или 16 цифр карты">
        
        <button onclick="saveJar()">💾 Сохранить реквизиты</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const childrenParam = urlParams.get('children');
        
        const select = document.getElementById('childSelect');
        let childJars = {};

        // ПРАВИЛЬНЫЙ ПАРСИНГ ДЕТЕЙ С БАНКАМИ
        if (childrenParam && childrenParam !== 'none') {
            childrenParam.split(',').forEach(item => {
                const parts = item.split(':');
                const subParts = parts[1].split('^');
                const childId = parts[0];
                const childName = subParts[0];
                const jarUrl = subParts[1] || '';
                
                childJars[childId] = jarUrl;
                select.innerHTML += `<option value="${childId}">${childName}</option>`;
            });
        } else {
            select.innerHTML = '<option value="">Сначала добавьте ребенка</option>';
        }

        // Автоматически подставляем банку при выборе ученика
        function onChildChange() {
            const selectedId = select.value;
            if (selectedId) {
                document.getElementById('jarInput').value = childJars[selectedId] || '';
            }
        }

        function saveJar() {
            const id = select.value;
            if (!id) return alert("Выберите ученика!");
            const val = document.getElementById('jarInput').value.trim();
            tg.sendData(`update_jar|${id}|${val}`);
            tg.close();
        }

        // Вызываем сразу при загрузке
        onChildChange();
    </script>
</body>
</html>
