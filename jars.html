<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройки Реквизитов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); margin: 0; padding: 16px; }
        .card { background: var(--tg-theme-bg-color, #2c2d30); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; color: var(--tg-theme-hint-color, #8e8e93); }
        select, input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; font-size: 15px; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); outline: none; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--tg-theme-button-color, #4388cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }
        .hint { font-size: 11px; color: var(--tg-theme-hint-color, #8e8e93); margin-top: -10px; margin-bottom: 15px; display: block; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-title">👶 Выберите ребенка</div>
        <select id="childSelect" onchange="onChildChange()"></select>
        
        <div class="card-title">💳 Банка или номер карты</div>
        <input type="text" id="jarInput" placeholder="https://send.monobank.ua/jar/... или 4441...">
        <span class="hint">Сюда можно вставить ссылку на Монобанку ребенка или просто номер его карты для личных переводов.</span>
        
        <button class="btn-submit" onclick="saveJar()">💾 Сохранить реквизиты</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const childrenParam = urlParams.get('children');
        
        const select = document.getElementById('childSelect');
        let childJars = {};

        function showAlert(message) {
            if (tg.showAlert) tg.showAlert(message);
            else alert(message);
        }

        function addOption(value, label) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = label;
            select.appendChild(option);
        }

        if (childrenParam && childrenParam !== 'none') {
            select.replaceChildren();
            childrenParam.split(',').forEach(item => {
                const separator = item.indexOf(':');
                if (separator < 1) return;
                const childId = item.slice(0, separator);
                const childData = item.slice(separator + 1).split('^');
                const childName = childData[0];
                const jarUrl = childData.slice(1).join('^');
                if (!/^\d+$/.test(childId)) return;
                childJars[childId] = jarUrl;
                addOption(childId, childName);
            });
        }
        if (!select.options.length) addOption('', 'Сначала добавьте ребёнка');

        function onChildChange() {
            const selectedId = select.value;
            if (selectedId) {
                document.getElementById('jarInput').value = childJars[selectedId] || '';
            }
        }

        function saveJar() {
            const id = select.value;
            if (!id) return showAlert("Выберите ребёнка.");
            const val = document.getElementById('jarInput').value.trim();
            if (/[|\r\n]/.test(val)) return showAlert("Реквизиты не должны содержать переносы строк или символ |.");
            
            // Если ввели ссылку на моно, проверяем, чтобы она была без опечаток
            if (val && val.toLowerCase().includes("mono") && !val.includes("send.monobank.ua/jar/")) {
                return showAlert("Исправьте ссылку на Монобанку. Формат: https://send.monobank.ua/jar/XXXXXX");
            }
            
            tg.sendData(`update_jar|${id}|${val}`);
            tg.close();
        }

        onChildChange();
    </script>
</body>
</html>
