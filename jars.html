<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки Банок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f7; }
        .card { background: white; border-radius: 12px; padding: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2481cc; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <label>Выберите ребенка:</label>
        <select id="childSelect" style="width:100%; padding:10px; margin-bottom:10px;"></select>
        <label>Банка или номер карты:</label>
        <input type="text" id="jarInput" placeholder="Ссылка на Моно или номер карты">
        <button onclick="saveJar()">💾 Сохранить реквизиты</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const children = JSON.parse(decodeURIComponent(urlParams.get('children') || '[]'));
        const select = document.getElementById('childSelect');
        children.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);

        function saveJar() {
            const id = select.value;
            const val = document.getElementById('jarInput').value;
            tg.sendData(`update_jar|${id}|${val}`);
            tg.close();
        }
    </script>
</body>
</html>
