<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройки Банок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); margin: 0; padding: 16px; }
        .card { background: var(--tg-theme-bg-color, #2c2d30); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; color: var(--tg-theme-hint-color, #8e8e93); }
        select, input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; font-size: 15px; background: var(--tg-theme-secondary-bg-color, #1c1c1d); color: var(--tg-theme-text-color, #ffffff); outline: none; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--tg-theme-button-color, #4388cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-title">👶 Выберите ребенка</div>
        <select id="childSelect" onchange="onChildChange()"></select>
        
        <div class="card-title">💳 Банка или номер карты</div>
        <input type="text" id="jarInput" placeholder="Ссылка на Моно или номер карты">
        
        <button class="btn-submit" onclick="saveJar()">💾 Сохранить реквизиты</button>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        const childrenParam = urlParams.get('children');
        
        const select = document.getElementById('childSelect');
        let childJars = {};

        if (childrenParam && childrenParam !== 'none') {
            select.innerHTML = '';
            childrenParam.split(',').forEach(item => {
                const parts = item.split(':');
                if (parts.length >= 2) {
                    const subParts = parts[1].split('^');
                    const childId = parts[0];
                    const childName = subParts[0];
                    const jarUrl = subParts[1] || '';
                    
                    childJars[childId] = jarUrl;
                    select.innerHTML += `<option value="${childId}">${childName}</option>`;
                }
            });
        } else {
            select.innerHTML = '<option value="">Сначала добавьте ребенка</option>';
        }

        function onChildChange() {
            const selectedId = select.value;
            if (selectedId) {
                document.getElementById('jarInput').value = childJars[selectedId] || '';
            }
        }

        function saveJar() {
            const id = select.value;
            if (!id) return alert("Выберите ученика!");
            const val = document.getElementById('jarInput').value.trim();
            tg.sendData(`update_jar|${id}|${val}`);
            tg.close();
        }

        onChildChange();
    </script>
</body>
</html>
