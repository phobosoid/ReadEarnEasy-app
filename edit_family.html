<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Состав семьи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0; padding: 16px;
        }
        .header h1 { font-size: 20px; margin: 0 0 4px 0; color: var(--tg-theme-button-color, #4388cc); text-align: center; }
        .header p { font-size: 13px; margin: 0 0 20px 0; color: var(--tg-theme-hint-color, #8e8e93); text-align: center; }
        
        .member-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--tg-theme-bg-color, #2c2d30);
            border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .member-info { display: flex; flex-direction: column; }
        .member-name { font-size: 16px; font-weight: 600; }
        .member-role { font-size: 12px; color: var(--tg-theme-hint-color, #8e8e93); text-transform: uppercase; margin-top: 2px; }
        
        .btn-delete {
            background-color: #ff3b30; color: #ffffff; border: none;
            padding: 8px 12px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer;
        }
        .btn-delete:active { background-color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👨‍👩‍👦 Состав семьи</h1>
        <p>Управление учетными записями участников</p>
    </div>

    <div id="membersContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем информацию о том, кто именно открыл это Mini App
        const currentUserId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : null;

        const urlParams = new URLSearchParams(window.location.search);
        const membersParam = urlParams.get('members');
        const container = document.getElementById('membersContainer');

        function showAlert(message) {
            if (tg.showAlert) tg.showAlert(message);
            else alert(message);
        }

        function addMemberRow(memberId, memberName, memberRole) {
            const row = document.createElement('div');
            row.className = 'member-row';

            const info = document.createElement('div');
            info.className = 'member-info';
            const name = document.createElement('span');
            name.className = 'member-name';
            name.textContent = `${memberName}${memberId === currentUserId ? ' (Вы)' : ''}`;
            const role = document.createElement('span');
            role.className = 'member-role';
            role.textContent = memberRole === 'child' ? '👶 Ребёнок' : '👨‍👩‍👦 Родитель';
            info.append(name, role);

            const removeButton = document.createElement('button');
            removeButton.className = 'btn-delete';
            removeButton.textContent = 'Удалить';
            removeButton.addEventListener('click', () => removeMember(memberId, memberName));
            if (memberId === currentUserId) removeButton.disabled = true;

            row.append(info, removeButton);
            container.appendChild(row);
        }

        if (membersParam && membersParam !== 'none') {
            container.replaceChildren();
            membersParam.split(',').forEach(item => {
                const separator = item.indexOf(':');
                if (separator < 1) return;
                const mId = item.slice(0, separator);
                const memberData = item.slice(separator + 1).split('^');
                const mName = memberData[0];
                const mRole = memberData[1];
                if (/^\d+$/.test(mId) && mName && (mRole === 'child' || mRole === 'parent')) {
                    addMemberRow(mId, mName, mRole);
                }
            });
        }
        if (!container.children.length) container.textContent = 'Участники не найдены.';

        function removeMember(id, name) {
            if (currentUserId && id === currentUserId) {
                return showAlert("Вы не можете удалить себя из состава семьи.");
            }
            const message = `Удалить пользователя «${name}»? Его активные задания также будут удалены.`;
            const confirmRemoval = (confirmed) => {
                if (!confirmed) return;
                tg.sendData(`remove_member|${id}|${name.replace(/[|\r\n]/g, ' ')}`);
                tg.close();
            };
            if (tg.showConfirm) tg.showConfirm(message, confirmRemoval);
            else confirmRemoval(confirm(message));
        }
    </script>
</body>
</html>
