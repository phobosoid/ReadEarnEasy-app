<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Состав семьи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0; padding: 16px;
        }
        .header h1 { font-size: 20px; margin: 0 0 4px 0; color: var(--tg-theme-button-color, #4388cc); text-align: center; }
        .header p { font-size: 13px; margin: 0 0 20px 0; color: var(--tg-theme-hint-color, #8e8e93); text-align: center; }
        
        .member-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--tg-theme-bg-color, #2c2d30);
            border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .member-info { display: flex; flex-direction: column; }
        .member-name { font-size: 16px; font-weight: 600; }
        .member-role { font-size: 12px; color: var(--tg-theme-hint-color, #8e8e93); text-transform: uppercase; margin-top: 2px; }
        
        .btn-delete {
            background-color: #ff3b30; color: #ffffff; border: none;
            padding: 8px 12px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer;
        }
        .btn-delete:active { background-color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👨‍👩‍👦 Состав семьи</h1>
        <p>Управление учетными записями участников</p>
    </div>

    <div id="membersContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем информацию о том, кто именно открыл это Mini App
        const currentUserId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : null;

        const urlParams = new URLSearchParams(window.location.search);
        const membersParam = urlParams.get('members');
        const container = document.getElementById('membersContainer');

        if (membersParam && membersParam !== 'none') {
            container.innerHTML = '';
            membersParam.split(',').forEach(item => {
                const parts = item.split(':'); // parts[0] - ID, parts[1] - Имя^Роль
                const subParts = parts[1].split('^');
                const mId = parts[0];
                const mName = subParts[0];
                const mRole = subParts[1];

                let roleText = mRole === 'child' ? '👶 Ребенок' : '👨‍👩‍👦 Родитель';

                container.innerHTML += `
                    <div class="member-row">
                        <div class="member-info">
                            <span class="member-name">${mName} ${mId === currentUserId ? '(Вы)' : ''}</span>
                            <span class="member-role">${roleText}</span>
                        </div>
                        <button class="btn-delete" onclick="removeMember('${mId}', '${mName}')">Удалить</button>
                    </div>
                `;
            });
        } else {
            container.innerHTML = '<p style="text-align:center; color:gray;">Участники не найдены.</p>';
        }

        function removeMember(id, name) {
            if (currentUserId && id === currentUserId) {
                return alert("Вы не можете удалить самого себя из интерфейса управления семьей!");
            }
            if (confirm(`Вы уверены, что хотите навсегда удалить пользователя ${name} из системы семьи? Все его активные задания будут аннулированы.`)) {
                tg.sendData(`remove_member|${id}|${name}`);
                tg.close();
            }
        }
    </script>
</body>
</html>
